<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Fully self-contained, same pattern as live-metrics.html on the Home page.
  ADG ADVANTAGE (updated): now pulls from the same source and method as
  lel-adg-indicators.html, OptiWeigh_Assets_view's adg_all field (the
  OptiWeigh device's own per-session ADG figure), matched to SeaFeed/Control
  via case-insensitive Treatment_Type LIKE patterns, with SeaFeed and
  Control each dated independently (latest by snapshot_date, tie-broken by
  OBJECTID). adg_all comes back in kg/day but is converted x1000 here so the
  stat still reads in grams, e.g. "+12 g/day", matching how this card has
  always displayed it. Flags itself (amber, does not hide) if either reading
  is more than STALE_AFTER_DAYS old, and notes it when SeaFeed and Control
  readings come from different dates.
  TOTAL CO2e ABATED (replaces the old "cost per kg CH4 abated" card): same
  calculation as farms-illustrative-carbon-value.html, cumulative CH4 abated
  per head x representative head count x the trial's GWP100 factor, sourced
  live from LEL_Industry_Benchmarks (metric_name='METHANE_GWP100_AR5',
  falls back to AR5's 28 if that lookup fails) rather than hardcoding it
  twice. SeaFeed group, trial-to-date, not annualised or scaled to a herd.
  The other two stats (abatement rate, days of trial data) are unchanged and
  still read from LEL_Emissions_Data_view / OptiWeigh_Cattle_Weights.
  LOADING SKELETONS (added 22 Jul 2026): each stat value renders as a
  shimmering placeholder span until loadBanner() resolves. Success path
  needs no extra handling — setting .textContent on the stat <p> replaces
  the skeleton span automatically. The catch{} block now explicitly writes
  '—' to all four stats so a failed fetch clears the skeletons instead of
  leaving them shimmering forever.
-->
<style>
  html,body{ margin:0; background:transparent; }
  body{ font-family:Verdana,Tahoma,sans-serif; }
  .tf-wrap{ padding:0 4px; }
  .tf-banner-status{ font-family:Tahoma,Verdana,sans-serif; font-size:11px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; margin:0 0 16px 0; }
  .tf-stats-grid{ display:grid; grid-template-columns:1.4fr 1fr 1fr; gap:16px; }
  @media (max-width:700px){ .tf-stats-grid{ grid-template-columns:1fr; } }
  .tf-stack{ display:flex; flex-direction:column; gap:16px; }
  .tf-adg-meta.stale{ color:#c98a2e !important; font-weight:700; }

  @keyframes tf-shimmer{
    0%{ background-position:150% 0; }
    100%{ background-position:-50% 0; }
  }
  .tf-skel, .tf-skel-dark{
    display:inline-block;
    border-radius:6px;
    background-size:250% 100%;
    animation:tf-shimmer 1.4s ease-in-out infinite;
    vertical-align:middle;
  }
  .tf-skel{
    background-image:linear-gradient(90deg, rgba(4,18,33,0.08) 25%, rgba(4,18,33,0.16) 37%, rgba(4,18,33,0.08) 63%);
  }
  .tf-skel-dark{
    background-image:linear-gradient(90deg, rgba(255,255,255,0.10) 25%, rgba(255,255,255,0.22) 37%, rgba(255,255,255,0.10) 63%);
  }
  @media (prefers-reduced-motion: reduce){ .tf-skel, .tf-skel-dark{ animation:none !important; } }
</style>
</head>
<body>
  <div class="tf-wrap">
    <p class="tf-banner-status" id="banner-status" style="color:#73818c;">Loading live data…</p>
    <div class="tf-stats-grid">
      <div style="background:#041221; border-radius:10px; padding:26px 28px; display:flex; flex-direction:column; justify-content:center;">
        <p style="font-size:13px; color:#c2d2de; margin:0 0 10px 0;">Modelled abatement rate</p>
        <p style="font-family:Tahoma,Verdana,sans-serif; font-weight:700; color:#79e3c1; font-size:42px; line-height:1; margin:0;" id="b-abatement"><span class="tf-skel-dark" style="width:110px; height:34px;"></span></p>
        <p style="font-size:12px; color:#c2d2de; margin:10px 0 0 0;">SeaFeed group, most recent trial reading</p>
      </div>
      <div class="tf-stack">
        <div style="background:#ffffff; border:1px solid #5ec9a8; border-radius:10px; box-shadow:0 1px 2px rgba(4,18,33,0.08); padding:18px 20px;">
          <p style="font-size:13px; color:#73818c; margin:0 0 8px 0;">ADG advantage</p>
          <p style="font-family:Tahoma,Verdana,sans-serif; font-weight:700; color:#3aa989; font-size:24px; margin:0;" id="b-adg"><span class="tf-skel" style="width:92px; height:20px;"></span></p>
          <p class="tf-adg-meta" style="font-size:11.5px; color:#73818c; margin:6px 0 0 0;" id="b-adg-meta">SeaFeed vs control</p>
        </div>
        <div style="background:#e6f6ff; border:1px solid #d6e5f2; border-radius:10px; padding:18px 20px;">
          <p style="font-size:13px; color:#73818c; margin:0 0 8px 0;">Total CO2e abated</p>
          <p style="font-family:Tahoma,Verdana,sans-serif; font-weight:700; color:#041221; font-size:24px; margin:0;" id="b-co2e"><span class="tf-skel" style="width:76px; height:20px;"></span></p>
          <p style="font-size:11.5px; color:#73818c; margin:6px 0 0 0;">Cumulative, SeaFeed group</p>
        </div>
      </div>
      <div style="background:#e6f6ff; border:1px solid #d6e5f2; border-radius:10px; padding:22px 24px; display:flex; flex-direction:column; justify-content:center;">
        <p style="font-size:13px; color:#73818c; margin:0 0 8px 0;">Days of trial data</p>
        <p style="font-family:Tahoma,Verdana,sans-serif; font-weight:700; color:#041221; font-size:30px; margin:0;" id="b-days"><span class="tf-skel" style="width:56px; height:24px;"></span></p>
        <p style="font-size:11.5px; color:#73818c; margin:8px 0 0 0;">Since first recorded liveweight</p>
      </div>
    </div>
  </div>
