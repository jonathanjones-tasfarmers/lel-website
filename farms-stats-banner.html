<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Fully self-contained, same pattern as live-metrics.html on the Home page. -->
<style>
  html,body{ margin:0; background:transparent; }
  body{ font-family:Verdana,Tahoma,sans-serif; }
  .tf-wrap{ padding:0 4px; }
  .tf-banner-status{ font-family:Tahoma,Verdana,sans-serif; font-size:11px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; margin:0 0 16px 0; }
  .tf-stats-grid{ display:grid; grid-template-columns:1.4fr 1fr 1fr; gap:16px; }
  @media (max-width:700px){ .tf-stats-grid{ grid-template-columns:1fr; } }
  .tf-stack{ display:flex; flex-direction:column; gap:16px; }
</style>
</head>
<body>
  <div class="tf-wrap">
    <p class="tf-banner-status" id="banner-status" style="color:#73818c;">Loading live data…</p>

    <div class="tf-stats-grid">
      <div style="background:#041221; border-radius:10px; padding:26px 28px; display:flex; flex-direction:column; justify-content:center;">
        <p style="font-size:13px; color:#c2d2de; margin:0 0 10px 0;">Modelled abatement rate</p>
        <p style="font-family:Tahoma,Verdana,sans-serif; font-weight:700; color:#79e3c1; font-size:42px; line-height:1; margin:0;" id="b-abatement">—</p>
        <p style="font-size:12px; color:#c2d2de; margin:10px 0 0 0;">SeaFeed group, most recent trial reading</p>
      </div>

      <div class="tf-stack">
        <div style="background:#ffffff; border:1px solid #5ec9a8; border-radius:10px; box-shadow:0 1px 2px rgba(4,18,33,0.08); padding:18px 20px;">
          <p style="font-size:13px; color:#73818c; margin:0 0 8px 0;">ADG advantage</p>
          <p style="font-family:Tahoma,Verdana,sans-serif; font-weight:700; color:#3aa989; font-size:24px; margin:0;" id="b-adg">—</p>
          <p style="font-size:11.5px; color:#73818c; margin:6px 0 0 0;">SeaFeed vs control</p>
        </div>
        <div style="background:#e6f6ff; border:1px solid #d6e5f2; border-radius:10px; padding:18px 20px;">
          <p style="font-size:13px; color:#73818c; margin:0 0 8px 0;">Cost per kg CH4 abated</p>
          <p style="font-family:Tahoma,Verdana,sans-serif; font-weight:700; color:#041221; font-size:24px; margin:0;" id="b-cost">—</p>
          <p style="font-size:11.5px; color:#73818c; margin:6px 0 0 0;">Cumulative, SeaFeed group</p>
        </div>
      </div>

      <div style="background:#e6f6ff; border:1px solid #d6e5f2; border-radius:10px; padding:22px 24px; display:flex; flex-direction:column; justify-content:center;">
        <p style="font-size:13px; color:#73818c; margin:0 0 8px 0;">Days of trial data</p>
        <p style="font-family:Tahoma,Verdana,sans-serif; font-weight:700; color:#041221; font-size:30px; margin:0;" id="b-days">—</p>
        <p style="font-size:11.5px; color:#73818c; margin:8px 0 0 0;">Since first recorded liveweight</p>
      </div>
    </div>
  </div>

<script>
  const EMISSIONS_URL = "https://services6.arcgis.com/RkRGg1mAki7yG3EG/arcgis/rest/services/LEL_Emissions_Data_view/FeatureServer/0/query";
  const ECON_URL = "https://services6.arcgis.com/RkRGg1mAki7yG3EG/arcgis/rest/services/LEL_Economics_Data/FeatureServer/0/query";
  const BENCHMARKS_URL = "https://services6.arcgis.com/RkRGg1mAki7yG3EG/arcgis/rest/services/LEL_Industry_Benchmarks/FeatureServer/0/query";
  const PRODUCTIVITY_URL = "https://services6.arcgis.com/RkRGg1mAki7yG3EG/arcgis/rest/services/OptiWeigh_Cattle_Weights/FeatureServer/0/query";

  async function q(url, params){
    const res = await fetch(url + "?" + new URLSearchParams(params));
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || "Query failed");
    return data;
  }

  async function fetchLatestSeafeedEmissions(){
    const data = await q(EMISSIONS_URL, { where:"treatment='seafeed'", outFields:"abatement_rate,record_date", orderByFields:"record_date DESC", resultRecordCount:"1", f:"json" });
    return data.features.length ? data.features[0].attributes : null;
  }
  async function fetchEconLatest(){
    const data = await q(ECON_URL, { where:"treatment IN ('seafeed','control')", outFields:"treatment,cumulative_ch4_abated_kg_per_head,representative_head_count,cost_per_kg_ch4_abated_aud,cost_per_head_aud,weight_gain_kg_per_head,cost_per_kg_gain_aud,calculation_date", orderByFields:"calculation_date DESC", resultRecordCount:"50", f:"json" });
    const latest = {};
    for (const f of data.features){ const t=f.attributes.treatment; if(!latest[t]) latest[t]=f.attributes; }
    return latest;
  }
  async function fetchProdHistory(treatment){
    const data = await q(PRODUCTIVITY_URL, { where:`treatment_group='${treatment}'`, outFields:"snapshot_date,rolling_adg", orderByFields:"snapshot_date ASC", resultRecordCount:"2000", f:"json" });
    return data.features.map(f => f.attributes);
  }

  async function loadBanner(){
    const statusEl = document.getElementById('banner-status');
    try{
      const [emissions, econ, seafeedProd, controlProd] = await Promise.all([
        fetchLatestSeafeedEmissions(), fetchEconLatest(), fetchProdHistory('seafeed'), fetchProdHistory('control')
      ]);
      const abatement = (emissions && emissions.abatement_rate != null) ? emissions.abatement_rate.toFixed(1)+'%' : '—';
      const seafeedAdg = seafeedProd.length ? seafeedProd[seafeedProd.length-1].rolling_adg : null;
      const controlAdg = controlProd.length ? controlProd[controlProd.length-1].rolling_adg : null;
      const adg = (seafeedAdg!=null && controlAdg!=null) ? ((seafeedAdg-controlAdg)>=0?'+':'') + Math.round(seafeedAdg-controlAdg) + ' g/day' : '—';
      const seafeedEcon = econ['seafeed'];
      const cost = (seafeedEcon && seafeedEcon.cost_per_kg_ch4_abated_aud != null) ? '$' + Number(seafeedEcon.cost_per_kg_ch4_abated_aud).toFixed(2) : '—';
      const allDates = seafeedProd.concat(controlProd).map(r=>r.snapshot_date).filter(d=>d!=null);
      const days = allDates.length ? Math.round((Date.now()-Math.min(...allDates))/86400000).toLocaleString() : '—';

      document.getElementById('b-abatement').textContent = abatement;
      document.getElementById('b-adg').textContent = adg;
      document.getElementById('b-cost').textContent = cost;
      document.getElementById('b-days').textContent = days;
      statusEl.textContent = 'Live data, updated ' + new Date().toLocaleDateString();
      statusEl.style.color = '#3aa989';
    } catch (err){
      statusEl.textContent = 'Live data unavailable right now';
      statusEl.style.color = '#c98a2e';
      console.error(err);
    }
  }

  loadBanner();
</script>
</body>
</html>
